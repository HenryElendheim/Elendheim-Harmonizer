name: Build APK

# Builds a debug APK you can sideload. Runs when a release is published (and
# attaches the APK to that release), or on demand from the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Name the APK after the version
        id: apk
        run: |
          tag="${{ github.event.release.tag_name }}"
          if [ -z "$tag" ]; then tag="${{ github.ref_name }}"; fi
          dest="Elendheim-Harmonizer-${tag}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$dest"
          echo "path=$dest" >> "$GITHUB_OUTPUT"

      - name: Upload as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: elendheim-harmonizer-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Attach the APK to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
